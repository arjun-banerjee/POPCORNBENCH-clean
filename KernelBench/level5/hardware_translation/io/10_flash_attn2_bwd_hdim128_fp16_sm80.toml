contract = """
# I/O contract only — implement ModelNew with custom CUDA for the target GPU.
# Use ``torch.utils.cpp_extension.load_inline`` (or equivalent) for device code.


import torch
import torch.nn as nn
import torch.nn.functional as F

BATCH = 2
NUM_HEADS = 32
NUM_KV_HEADS = 8
SEQ_LEN = 1024
HEAD_DIM = 128

def get_inputs():
    dtype = torch.bfloat16
    q = torch.randn(BATCH, NUM_HEADS, SEQ_LEN, HEAD_DIM,
                    dtype=dtype, requires_grad=True).cuda()
    k = torch.randn(BATCH, NUM_KV_HEADS, SEQ_LEN, HEAD_DIM,
                    dtype=dtype, requires_grad=True).cuda()
    v = torch.randn(BATCH, NUM_KV_HEADS, SEQ_LEN, HEAD_DIM,
                    dtype=dtype, requires_grad=True).cuda()
    dout = torch.randn(BATCH, NUM_HEADS, SEQ_LEN, HEAD_DIM, dtype=dtype).cuda()
    return [q, k, v, dout]

def get_init_inputs():
    return [NUM_HEADS, NUM_KV_HEADS, HEAD_DIM]

# ModelNew must define __init__(*get_init_inputs()) and forward(*get_inputs()) so outputs match the hidden reference implementation on the evaluation GPU.
"""

# Multi-rank (torchrun) world size for submit_kernel / run_correctness /
# profile_kernel. 8 = full 8xH100 node; sweep TOML default is overridden
# per-problem from this value.
distributed_world_size = 8
