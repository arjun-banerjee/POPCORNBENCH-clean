contract = """
# I/O contract only - implement ModelNew with custom CUDA for the target GPU.
# Use ``torch.utils.cpp_extension.load_inline`` (or equivalent) for device code.


import torch
import torch.nn as nn

BATCH = 96
M = 384
N = 192
K = 384
D1 = 12
ALPHA = 1.0
BETA = 0.0

def get_inputs():
    return [torch.randn(BATCH, M, K, dtype=torch.float16).cuda()]

def get_init_inputs():
    return [BATCH, K, N, D1, ALPHA, BETA]

# ModelNew must define __init__(*get_init_inputs()) and forward(*get_inputs()) so outputs match the hidden reference implementation on the evaluation GPU.
"""

