# Single-pass rerun for combined errors across original + popcorn variants.
# Original (2): L2 P29, P31  |  Popcorn (3): L2 P35, P47, P50  |  Total: 5
#
#   uv run python scripts/run_sweep.py configs/sweep.rerun_errors.toml

[run]
name              = "l123_single_gpt"   # writes into the same run folder — replaces error trajectories
runs_dir          = "runs"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [2]
force_rerun       = true                # overwrite finished (errored) trajectories
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "submit_kernel"     # single-pass: no feedback loop

[run.problem_subset_by_variant_level.original]
2 = [29, 31]

[run.problem_subset_by_variant_level.popcorn]
2 = [35, 47, 50]

[agent]
max_turns          = 1
max_tool_calls     = 1
warn_turns_remaining = 0
turn_delay_s       = 0.0
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 1
perf_lock_per_gpu  = true
worker_timeout_s   = 600

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"
