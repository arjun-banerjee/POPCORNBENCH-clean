# L1 + L2, both variants, multi-turn with every tool including the
# heavy diagnostic tools: profile_kernel (Nsight Compute),
# disassemble_kernel (cuobjdump/nvdisasm), ert_roofline (empirical
# roofline micro-benchmarks).
#
# Higher max_turns + max_tool_calls so the agent can actually exercise
# the new tools. profile_kernel runs ncu in a subprocess; both compile
# and ncu route through the per-GPU FIFO eval queue so timing stays
# clean under oversubscription.
#
# Requires: nsight-python + ncu in PATH for profile_kernel; cuobjdump
# and nvdisasm (CUDA Toolkit) for disassemble_kernel. Tools that aren't
# available will fail gracefully and the agent will move on.
#
# Coverage:
#   L1 original: 100, L1 popcorn: 34
#   L2 original: 100, L2 popcorn: 45
#   = 279 problems x 2 models = 558 work items.
#
#   uv run python scripts/run_sweep.py configs/sweep.l12_all.toml

[run]
name              = "l3_default_gpt"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [3]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "default"

[agent]
max_turns          = 15
max_tool_calls     = 50
warn_turns_remaining = 3
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 4
use_eval_queue     = true
worker_timeout_s   = 5400
eval_rpc_timeout_s = 5400

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"
