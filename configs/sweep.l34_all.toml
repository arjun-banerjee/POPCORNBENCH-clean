# L3 + L4, both variants, multi-turn with every tool including
# profile_kernel, disassemble_kernel, ert_roofline.
#
# Coverage:
#   L3 original: 50,  L3 popcorn: 14
#   L4 original: 20,  L4 popcorn: 31
#   = 115 problems x 2 models = 230 work items.
#
# This is the heaviest cell of the matrix: heavy tools + multi-second
# reference forwards. num_perf_trials lowered to 10 (vs 20 in the
# default tier) so submit_kernel + profile_kernel together still fit
# inside worker_timeout_s on the slowest problems. agents_per_gpu kept
# low so the per-GPU eval queue depth stays manageable when each
# request is several minutes of work.
#
#   uv run python scripts/run_sweep.py configs/sweep.l34_all.toml

[run]
name              = "l34_all"
dataset_src       = "local"
variants          = ["popcorn"]
levels            = [3, 4]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 3
num_perf_trials   = 10
tools             = "all"

[agent]
max_turns          = 12
max_tool_calls     = 40
warn_turns_remaining = 3
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 2
use_eval_queue     = true
worker_timeout_s   = 7200
eval_rpc_timeout_s = 7200

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "Kimi-K2.6"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000
