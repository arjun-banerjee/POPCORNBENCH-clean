# Example sweep config for run_sweep.py.
#
# Usage:
#   uv run python scripts/run_sweep.py config=configs/sweep.example.toml
#
# Each entry under [[models]] declares one model + endpoint + key env var.
# Per-model rate limits default to 250 req/min and 250k tokens/min; override
# them per model if you have a different quota.

[run]
name              = "sweep_demo"
runs_dir          = "runs"
dataset_src       = "local"     # "local" reads KernelBench/level{N}/{variant}/
dataset_name      = "ScalingIntelligence/KernelBench"
variants          = ["original", "popcorn"]   # sweep axis (local only). Single string also accepted.
levels            = [1]
problem_subset    = []          # empty = all problems in the level(s)
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "default"   # "default" | "all" | comma-separated names

[agent]
max_turns          = 10
max_tool_calls     = 30
warn_turns_remaining = 2
turn_delay_s       = 0.0
reasoning_effort   = "medium"   # null | "minimal" | "low" | "medium" | "high"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 3          # oversubscription factor (LLM-wait dominates)
perf_lock_per_gpu  = true       # serialize perf-timing trials on each GPU

[report]
enabled            = true
refresh_seconds    = 30         # rebuild HTML this often while sweep runs
serve              = true       # also launch a live HTTP server
serve_host         = "0.0.0.0"  # 0.0.0.0 = anywhere; "127.0.0.1" if behind SSH only
serve_port         = 8765

# ------------------------------------------------------------------
# Models. Each block becomes one (model, endpoint, key) target.
# ------------------------------------------------------------------

[[models]]
name               = "gpt-5.4-pro"
api_kind           = "openai"   # "openai" (Responses API) | "openai_chat" (Chat Completions)
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "TEJAS_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "gpt-5.5"
api_kind           = "openai"
base_url           = "https://tejas-mohrgcfh-eastus2.cognitiveservices.azure.com/openai/v1/"
api_key_env        = "TEJAS_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"

[[models]]
name               = "FW-GLM-5-1"
api_kind           = "openai_chat"
base_url           = "https://popcorn-foundry-resource.openai.azure.com/openai/v1/"
api_key_env        = "POPCORN_AZURE_KEY"
rpm                = 250
tpm                = 250000

[[models]]
name               = "Llama-4-Maverick-17B-128E-Instruct-FP8"
api_kind           = "openai_chat"
base_url           = "https://thava-openai.services.ai.azure.com/models"
api_key_env        = "THAVA_AZURE_KEY"
rpm                = 250
tpm                = 250000

[[models]]
