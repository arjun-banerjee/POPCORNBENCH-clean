# L1 + L2, both variants, single-turn (no tools).
# The agent gets exactly one shot to call submit_kernel. Pure model
# knowledge baseline; compare against l12_default to measure the benefit
# of the iterative compile/correctness loop.
#
# Coverage:
#   L1 original: 100, L1 popcorn: 34
#   L2 original: 100, L2 popcorn: 45 (drops the 6 multi-GPU comm kernels)
#   = 279 problems x 2 models = 558 work items.
#
#   uv run python scripts/run_sweep.py configs/sweep.l12_single.toml

[run]
name              = "l123_single_gpt"
dataset_src       = "local"
variants          = ["original", "popcorn"]
levels            = [1, 2, 3]
problem_subset    = []
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "submit_kernel"

[agent]
max_turns          = 1
max_tool_calls     = 1
warn_turns_remaining = 0
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 6
use_eval_queue     = true
worker_timeout_s   = 1200
eval_rpc_timeout_s = 1200

[report]
enabled            = true
refresh_seconds    = 60
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"