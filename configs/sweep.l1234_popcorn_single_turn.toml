# L1–L4 (original + popcorn), single-turn baseline: submit_kernel only.
#
# Models match configs/sweep.l5_hw_translation_all.toml (GPT-5.5 centralus,
# GLM Foundry, Llama-Maverick, Grok).
#
#   uv run python scripts/run_sweep.py configs/sweep.l1234_popcorn_single_turn.toml
#   ./scripts/run_l1234_popcorn_matrix_sweeps.sh   # all three tool tiers + watchdog

[run]
name                    = "pop_l123_st_gpt"
dataset_src             = "local"
variants                = ["popcorn"]
levels                  = [1, 2, 3]
problem_subset          = []
backend                 = "cuda"
precision               = "fp32"
gpu_arch                = ["Hopper"]
timing_method           = "cuda_event"
num_correct_trials      = 5
# L3/L4 reference forwards can be heavy; keep submit_kernel bounded.
num_perf_trials         = 40
tools                   = "submit_kernel"

[agent]
max_turns               = 1
max_tool_calls          = 1
warn_turns_remaining    = 0
reasoning_effort        = "medium"
llm_error_retries       = 5

[parallelism]
num_gpu_devices         = 8
agents_per_gpu          = 4
use_eval_queue          = true
worker_timeout_s        = 7200
eval_rpc_timeout_s      = 7200
llm_global_concurrency  = 0

[report]
enabled                 = true
refresh_seconds         = 60
serve                   = true
serve_host              = "0.0.0.0"
serve_port              = 8765

# Models: same block as sweep.l5_hw_translation_all.toml (cross-run comparability).
[[models]]
name                    = "gpt-5.5-priority"
api_kind                = "openai"
base_url                = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env             = "POPCORN_CENTRAL_AZURE_KEY"
rpm                     = 250
tpm                     = 250000
reasoning_effort        = "medium"

[[models]]
name                    = "FW-GLM-5-1"
api_kind                = "openai_chat"
base_url                = "https://popcorn-foundry-resource.openai.azure.com/openai/v1/"
api_key_env             = "POPCORN_AZURE_KEY"
rpm                     = 250
tpm                     = 250000
omit_chat_run_meta      = true

# xAI Grok — set XAI_API_KEY (see configs/sweep.grok.toml).
[[models]]
name                    = "grok-4.3"
api_kind                = "openai_chat"
base_url                = "https://api.x.ai/v1"
api_key_env             = "XAI_API_KEY"
deployment_name         = "grok-4.3"
request_timeout_s       = 3600
rpm                     = 60
tpm                     = 200000
