# Level-5 hardware translation sweep: re-optimize A100-tuned CUDA kernels for H100.
#
# Usage:
#   uv run python scripts/run_sweep.py configs/sweep.l5_hw_translation.toml

[run]
name                    = "l5_hw_translation_single"
dataset_src             = "local"
variants                = ["hardware_translation_stub"]
levels                  = [5]
problem_subset          = []
backend                 = "cuda"
precision               = "fp16"
gpu_arch                = ["Hopper"]
timing_method           = "cuda_event"
num_correct_trials      = 5
num_perf_trials         = 50
tools                   = "all"

# Hardware translation: A100 .cu in prompt; I/O from TOML; oracle Python in hardware_translation/oracle/
prompt_option                    = "hardware_translation"
source_hardware_gpu_name         = "A100"
hardware_gpu_name                = "H100"
source_kernel_dir               = "KernelBench/level5/kernels/a100"
hardware_translation_io_dir      = "KernelBench/level5/hardware_translation/io"
hardware_translation_oracle_dir  = "KernelBench/level5/hardware_translation/oracle"

[agent]
max_turns               = 10
max_tool_calls          = 30
warn_turns_remaining    = 2
reasoning_effort        = "medium"

[parallelism]
num_gpu_devices         = 8
agents_per_gpu          = 3
use_eval_queue          = true
worker_timeout_s        = 1200
eval_rpc_timeout_s      = 1200

[report]
enabled                 = true
refresh_seconds         = 60
serve                   = true
serve_host              = "0.0.0.0"
serve_port              = 8765

[[models]]
name                    = "gpt-5.5-priority"
api_kind                = "openai"
base_url                = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env             = "POPCORN_CENTRAL_AZURE_KEY"
rpm                     = 250
tpm                     = 250000
reasoning_effort        = "medium"
