# L1–L3 popcorn2: large-tier centers + biased per-trial jitter; multi-turn default tools.
#
#   uv run python scripts/run_sweep.py configs/sweep.l1234_popcorn2_default.toml
#   ./scripts/run_l1234_popcorn2_matrix_sweeps.sh

[run]
name                    = "pop_l123_popcorn2_default_gpt"
dataset_src             = "local"
variants                = ["popcorn2"]
levels                  = [1, 2, 3]
problem_subset          = []
backend                 = "cuda"
precision               = "fp32"
gpu_arch                = ["Hopper"]
timing_method           = "cuda_event"
num_correct_trials      = 5
num_perf_trials         = 100
tools                   = "default"
# submit_kernel: stress_refs2 (large/awkward/xl) × num_correct_trials/tier.
# run_correctness: canonical level*/popcorn2 refs (biased trial jitter only).
popcorn_stress_eval     = true
stress_refs_root        = "KernelBench/stress_refs2"
stress_tiers            = ["large", "awkward", "xl"]

[agent]
max_turns               = 10
max_tool_calls          = 40
warn_turns_remaining    = 3
reasoning_effort        = "medium"
llm_error_retries       = 5
tool_output_context_max_chars = 120000
reasoning_context_max_chars = 0
chat_context_tail_messages = 96

[parallelism]
num_gpu_devices         = 8
agents_per_gpu          = 6
use_eval_queue          = true
worker_timeout_s        = 7200
eval_rpc_timeout_s      = 7200
llm_global_concurrency  = 0

[report]
enabled                 = true
refresh_seconds         = 60
serve                   = true
serve_host              = "0.0.0.0"
serve_port              = 8765

[[models]]
name                    = "gpt-5.5-priority"
api_kind                = "openai"
base_url                = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env             = "POPCORN_CENTRAL_AZURE_KEY"
rpm                     = 250
tpm                     = 250000
reasoning_effort        = "medium"

[[models]]
name                    = "FW-GLM-5-1"
api_kind                = "openai_chat"
base_url                = "https://popcorn-foundry-resource.openai.azure.com/openai/v1/"
api_key_env             = "POPCORN_AZURE_KEY"
rpm                     = 250
tpm                     = 250000
omit_chat_run_meta      = true

[[models]]
name                    = "grok-4.3"
api_kind                = "openai_chat"
base_url                = "https://api.x.ai/v1"
api_key_env             = "XAI_API_KEY"
deployment_name         = "grok-4.3"
request_timeout_s       = 3600
rpm                     = 60
tpm                     = 200000
