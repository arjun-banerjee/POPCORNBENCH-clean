# Single-pass rerun for original variant errors.
#
#   uv run python scripts/run_sweep.py configs/sweep.rerun_errors_original.toml

[run]
name              = "l123_single_gpt"   # writes into the same run folder — replaces error trajectories
runs_dir          = "runs"
dataset_src       = "local"
variants          = ["original"]
levels            = [1, 2, 3]
force_rerun       = true                # overwrite finished (errored) trajectories
backend           = "cuda"
precision         = "fp32"
gpu_arch          = ["Hopper"]
timing_method     = "cuda_event"
num_correct_trials = 5
num_perf_trials   = 100
tools             = "submit_kernel"     # single-pass: no feedback loop

[run.problem_subset_by_level]
1  = [1, 4, 8, 9, 10, 13, 16, 17, 32, 35, 36, 51, 55, 57, 59, 62, 67, 74, 93, 95, 96, 98, 99, 100]
2  = [3, 28, 29, 31, 33, 34, 41, 43, 48, 50, 54, 57, 59, 62, 65, 67, 68, 71, 81, 87, 90]
3  = [6, 7, 8, 9, 10, 17, 22, 24, 25, 26, 29, 33, 36, 37, 41, 45]

[agent]
max_turns          = 1
max_tool_calls     = 1
warn_turns_remaining = 0
turn_delay_s       = 0.0
reasoning_effort   = "medium"

[parallelism]
num_gpu_devices    = 8
agents_per_gpu     = 1
perf_lock_per_gpu  = true
worker_timeout_s   = 600

[report]
enabled            = true
refresh_seconds    = 30
serve              = true
serve_host         = "0.0.0.0"
serve_port         = 8765

[[models]]
name               = "gpt-5.5-priority"
api_kind           = "openai"
base_url           = "https://popcorn-centralus-resource.services.ai.azure.com/openai/v1/"
api_key_env        = "POPCORN_CENTRAL_AZURE_KEY"
rpm                = 250
tpm                = 250000
reasoning_effort   = "medium"
