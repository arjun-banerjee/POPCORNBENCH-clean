# Order the components for the prompt in whatever way you want and use any
# created templates you want
components = [
    "custom_problem_statement",
    "problem_statement",
    "hardware_header",
    "hardware_specs",
    "hardware_best_practices",
    "arch_block",
    "precision_note",
    "examples_block",
