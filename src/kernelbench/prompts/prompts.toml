# Virtual "pytorch" source - lets translation prompts treat the original PyTorch
# Model as a source kernel uniformly. There is no PyTorch *target* (you cannot
# translate something into PyTorch in this benchmark), so this entry only
# carries source-side fields.
[backends.pytorch]
backend_display = "PyTorch operators"
source_display = "PyTorch"

# -------------------------------------------------------------------------
# Precision: Precision-specific configuration
# -------------------------------------------------------------------------
[precision.fp32]
precision_display = "FP32 (32-bit floating point)"

[precision.fp16]
precision_display = "FP16 (16-bit floating point)"

[precision.bf16]
precision_display = "BF16 (bfloat16)"

# -------------------------------------------------------------------------
# Templates: Reusable text blocks with placeholders
# -------------------------------------------------------------------------
[templates.common]

# --- Architecture Presentation ---
# Used to present the reference architecture/PyTorch kernel that needs optimization
arch_block = """
You are given the following architecture:


{ref_arch_src}

"""

# --- Source Kernel Presentation (translation mode) ---
# Used by the `translation` option to present an existing implementation in some
# source DSL alongside the PyTorch reference (`arch_block`).
source_kernel_block = """
Here is the existing {source_backend_display} implementation to translate:


{source_kernel_src}

"""

# Hardware translation: tensor / RNG I/O only — reference ``Model`` is not shown.
hardware_translation_io_contract = """
Tensor and constructor contract (the reference ``Model`` implementation is hidden from you).
Your ``ModelNew`` must use custom inlined {backend_display} (e.g. ``torch.utils.cpp_extension.load_inline``), not library routines that replace the whole kernel you were asked to port.


{io_contract_src}

"""

# -------------------------------------------------------------------------
# Examples Block
# -------------------------------------------------------------------------
# Shows example(s) of input architecture and optimized versions
# Dynamically formatted by Python code to handle single or multiple examples

examples_block = """
{examples_intro}

{examples_entries}
"""

# Different introductions for code examples depending on if its one shot or few shot

example_intro_one_shot = """
Here's an example to show you the syntax of inline embedding custom {backend_display} in PyTorch:
"""
example_intro_few_shot = """
Here are examples showing how to embed custom {backend_display} in PyTorch:
"""
example_intro_translation = """
Here is an example translation from {source_backend_display} to {backend_display}:
"""


# Will inject an input example and output example according to the backend.

example_entry_template = """
{example_label}

Input architecture:

{input_code}

Optimized with {backend_display}:

{output_code}
"""

# Translation example entry: emphasizes source DSL -> target DSL mapping rather
# than PyTorch -> custom kernel.
example_entry_template_translation = """
{example_label}

Source ({source_backend_display}) implementation:

{input_code}

Translated to {backend_display}:

{output_code}
"""


# -------------------------------------------------------------------------
#  Precision Information 
# -------------------------------------------------------------------------
# Specifies the target precision for optimization

precision_note = """
Note: The kernels should be optimized for {precision_display} precision.
"""

# -------------------------------------------------------------------------
# torch.compile Annotation Block
# -------------------------------------------------------------------------
# Used only by the `annotated_compile` option. Placeholders are filled by
# kernelbench.compile_annotations.build_annotated_context, which runs
# torch.compile (debug mode) on the reference model and extracts:
#   fx_graph, fusion_decisions, schedule_info, triton_kernels, call_fn, n_kernels
compile_annotations_block = """
The following is how `torch.compile` (Inductor backend) already decomposed and
lowered the reference model. Use it as a starting point — you can fuse more
aggressively, tile differently, or rewrite reductions, but the decomposition
below shows how the ops connect.

### ATen-level FX graph

```
{fx_graph}
```

### Inductor fusion decisions

```
{fusion_decisions}
```

### Op schedule (source -> ATen -> kernel)

```
{schedule_info}
```

### Generated Triton kernels ({n_kernels} kernel(s))

```python
{triton_kernels}
```

### Execution flow

```python
{call_fn}
```
"""

# -------------------------------------------------------------------------
# Custom Templates: Optional user-defined building blocks
# -------------------------------------------------------------------------
# Add any custom template blocks here and reference them from components lists.

# Example:

custom_problem_statement = """
Custom prompt intro goes here. You can reference {backend_display} or any
other placeholder supported in the shared context.
"""


# -------------------------------------------------------------------------
# Hardware Templates: GPU-specific information blocks
# -------------------------------------------------------------------------
[templates.hardware]
hardware_header = """
Here is some information about the underlying hardware that you should keep in mind.
"""

hardware_specs = """
The GPU that will run the kernel is {target_node_phrase} ({gpu_architecture} architecture).

{gpu_specs_bullets}
"""

hardware_definitions = """
Here are some concepts about the GPU architecture that could be helpful:

{gpu_definitions_bullets}
"""

hardware_best_practices = """
Here are some best practices for writing kernels on GPU:

{gpu_best_practices_bullets}
"""

source_hardware_specs = """
The source kernel was optimized for {source_node_phrase} ({source_gpu_architecture} architecture).

{source_gpu_specs_bullets}
"""

# -------------------------------------------------------------------------
# Options: Different prompt construction modes
# -------------------------------------------------------------------------

[options.zero_shot]
# Zero-shot: No examples provided—the model must infer everything from the description
components = ["problem_statement", "arch_block", "precision_note", "instruction"]

[options.one_shot]
# One-shot: Includes a single example to demonstrate the task
# This is the default KernelBench will use for model baseline performance 
components = ["problem_statement", "examples_block", "arch_block", "precision_note", "instruction"]
requires_example = "one_shot"

[options.few_shot]
# Few-shot: Multiple examples (falls back to one-shot if backend lacks few-shot entries)
components = ["problem_statement", "examples_block", "arch_block", "precision_note", "instruction"]
requires_example = "few_shot"

[options.annotated_compile]
# Annotated compile: augments the prompt with torch.compile's decomposition of
# the reference model (FX graph, fusion decisions, schedule, generated Triton
# kernels). Runs torch.compile at prompt-construction time — requires CUDA.
#
# Use with backend=triton. See kernelbench.compile_annotations for the
# extraction logic.
components = ["problem_statement", "arch_block", "compile_annotations_block", "precision_note", "instruction"]

[options.translation]
# Translation: rewrite an existing source-DSL kernel into the target backend.
# The PyTorch reference (arch_block) is still shown so the model knows the
# functional contract. Requires source_backend, source_kernel_src to be set
# in the render context (see get_translation_prompt).
components = ["translation_problem_statement", "source_kernel_block", "arch_block", "examples_block", "precision_note", "translation_instruction"]
requires_example = "translation"

[options.hardware_translation]
# Hardware translation: source CUDA (or same-DSL) tuned for GPU A → tuned for GPU B.
# Prompt = source kernel + hardware specs + I/O contract only (no reference ``Model``,
# no few-shot example). Numerical evaluation uses ``reference_kernel_dir`` Python
# modules (KernelBench-style ``Model`` + ``get_inputs`` for the target GPU).
requires_gpu = true
components = ["hardware_translation_problem_statement", "source_kernel_block", "source_hardware_specs", "hardware_header", "hardware_specs", "hardware_best_practices", "hardware_translation_io_contract", "precision_note", "hardware_translation_instruction"]

# -------------------------------------------------------------------------
# Translation Examples: per-(source, target) example pairs
# -------------------------------------------------------------------------
# Keys are formatted "<source_backend>__<target_backend>". Each entry is a list
# of [source_path, target_path] pairs to inject as few-shot translation
# demonstrations. If a key is missing, the renderer falls back to pairing the
# source backend's one_shot_new_arch with the target backend's one_shot_new_arch
# (works because every backend has a sibling implementation of the `add` example).
[translation_examples]
cuda__triton = [
    ["src/kernelbench/prompts/model_new_ex_add.py", "src/kernelbench/prompts/model_new_ex_add_triton.py"],
]
triton__helion = [
    ["src/kernelbench/prompts/model_new_ex_add_triton.py", "src/kernelbench/prompts/model_new_ex_add_helion.py"],
]
pytorch__helion = [
    ["src/kernelbench/prompts/model_ex_add.py", "src/kernelbench/prompts/model_new_ex_add_helion.py"],
]
pytorch__triton = [
    ["src/kernelbench/prompts/model_ex_add.py", "src/kernelbench/prompts/model_new_ex_add_triton.py"],
]
pytorch__cuda = [
    ["src/kernelbench/prompts/model_ex_add.py", "src/kernelbench/prompts/model_new_ex_add.py"],
]


