    ["src/kernelbench/prompts/few_shot/model_ex_fuse_gelu.py", "src/kernelbench/prompts/few_shot/model_new_ex_fuse_gelu.py"],
    ["src/kernelbench/prompts/few_shot/model_ex_flash_attn.py", "src/kernelbench/prompts/few_shot/model_new_ex_flash_attn.py"],
]

