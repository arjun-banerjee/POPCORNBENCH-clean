[meta]
version = "1.0"
default_backend = "cuda"
default_precision = "fp32"

# -------------------------------------------------------------------------
# Shared Templates: Used by all backends with placeholders
# -------------------------------------------------------------------------
[shared]
problem_statement = """
You write custom {backend_display} to replace the pytorch operators in the given architecture to get speedups.

You have complete freedom to choose the set of operators you want to replace. You may make the decision to replace some operators with custom {backend_display} and leave others unchanged. You may replace multiple operators with custom implementations, consider operator fusion opportunities (combining multiple operators into a single kernel, for example, combining matmul+relu), or algorithmic changes (such as online softmax). You are only limited by your imagination.
"""

instruction = """
Optimize the architecture named Model with custom {backend_display}! Name your optimized output architecture ModelNew. Output the new code in codeblocks. Please generate real code, NOT pseudocode, make sure the code compiles and is fully functional. Just output the new model code, no other text, and NO testing code!
"""

# Translation-mode problem statement: rewrite an existing kernel from a source DSL into a target DSL
translation_problem_statement = """
You translate the given {source_backend_display} implementation into an equivalent {backend_display} implementation. The translated kernel must produce numerically equivalent outputs to the reference PyTorch model. You may improve the kernel during translation (operator fusion, tiling, layout changes, algorithmic rewrites such as online softmax) as long as semantics are preserved.
"""

translation_instruction = """
Translate the {source_backend_display} implementation above into a {backend_display} version. Name the optimized output architecture ModelNew. Output the new code in a single codeblock. Generate real code, NOT pseudocode; the code must compile and be fully functional. Just output the new model code, no other text, and NO testing code!
"""

# Hardware-translation-mode: re-optimize a kernel from one GPU architecture to another.
# Optional placeholders set by the renderer (default to safe single-GPU copy
# when the sweep doesn't request multi-rank):
#   {target_node_phrase}  e.g. "an 8x H100 node" or "an H100"
#   {source_node_phrase}  e.g. "an 8x A100 node" or "an A100"
#   {multi_rank_block}    paragraph that describes torchrun + the hidden 8xH100
#                         reference path (empty string in single-GPU mode)
hardware_translation_problem_statement = """
You re-optimize the given {backend_display} device code for a different GPU. The source kernel was hand-tuned for {source_node_phrase} ({source_gpu_architecture} architecture) and you must adapt it to run efficiently on {target_node_phrase} ({gpu_architecture} architecture).

Your ``ModelNew`` must match the hidden evaluation reference on the tensor I/O contract below (same numerical outputs for the same inputs). Adapt tile sizes, shared memory, thread block dimensions, register pressure, memory access patterns, and any architecture-specific intrinsics for the target hardware. Consider differences in memory bandwidth, compute throughput, shared memory capacity, max registers per thread, and max thread blocks per SM/CU between the two architectures.{multi_rank_block}
"""

hardware_translation_instruction = """
Re-optimize the {backend_display} kernel above for {target_node_phrase} ({gpu_architecture}). Name the optimized output architecture ModelNew. Output the new code in a single codeblock. Generate real code, NOT pseudocode; the code must compile and be fully functional. Just output the new model code, no other text, and NO testing code!
"""

# Multi-rank addendum injected into the problem statement when target_world_size > 1.
# Mentions the hidden 8xH100 reference path by stem only (the file itself is
# never shown to the model).
hardware_translation_multi_rank_block = """

This problem is evaluated on {target_node_phrase} with world_size={target_world_size}: your ``ModelNew.forward`` is launched inside a ``torchrun --nproc_per_node={target_world_size}`` subprocess, one rank per device (each rank pins itself to ``cuda:LOCAL_RANK``). The submitter may use ``torch.distributed`` collectives (NCCL: ``all_reduce``, ``all_gather``, ``reduce_scatter``, ``broadcast``, ``send/recv``) and is expected to exploit all {target_world_size} GPUs. A hidden hand-tuned reference for this problem lives at ``KernelBench/level5/kernels/{target_node_shape}{target_gpu_name_lower}/{problem_stem}.cu`` (you are NOT shown its contents). Match the multi-rank structure that file implies — NCCL participation across world_size={target_world_size}, Hopper-specific patterns (WGMMA / TMA / async copies / cluster launch) that supersede the A100-era constructs in the source kernel above."""

hardware_translation_single_rank_block = ""

# Shared example architecture (same for all backends)
few_shot_example_arch = "src/kernelbench/prompts/model_ex_add.py"

# -------------------------------------------------------------------------
# Backends: Backend-specific configuration (minimal, just what varies)
# -------------------------------------------------------------------------
[backends.cuda]
backend_display = "CUDA operators"
# Display string used when this backend appears as the *source* of a translation
source_display = "CUDA"
# One-shot example (baseline, always available)
one_shot_new_arch = "src/kernelbench/prompts/model_new_ex_add.py"
# Few-shot examples (optional, multiple example pairs)
few_shot_examples = [
